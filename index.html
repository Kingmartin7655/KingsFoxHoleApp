<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foxhole Logistics Terminal v4.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Custom scrollbar to keep that "Pro" look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        // Using the standard React hooks from the global React object
        const { useState, useEffect, useRef } = React;

        // --- Mocking Firebase for the Static Deployment ---
        // Since __firebase_config and __app_id are injected in Canvas, 
        // we'll set defaults so the app doesn't crash on GitHub.
        const appId = "foxhole-logistics-v1";
        
        // --- Constants & Logic Mapping ---
        const PLAYER_OPTIONS = ["KingBigD", "Meta", "IndyGeek"];
        const MATERIAL_OPTIONS = ["Construction Materials", "Processed Construction Materials", "Steel Construction Materials", "Assembly Materials I", "Assembly Materials II", "Assembly Materials III", "Assembly Materials IV", "Assembly Materials V", "Coke", "Heavy Explosive Powder", "Petrol", "Heavy Oil", "Enriched Carbon", "Sulfur", "Coal", "Scrap"];
        const FACILITY_OPTIONS = ["Materials Factory", "Coal Refinery", "Oil Refinery", "Metalworks Factory", "Ammunition Factory", "Small Assembly Station", "Large Assembly Station", "Power Station", "Water Pump", "Fuel Silo", "Maintenance Tunnel", "Resource Container"];
        const MINE_TYPES = ["Scrap Mine", "Component Mine", "Sulfur Mine", "Oil Well", "Coal Field"];
        const FUEL_OPTIONS = ["Diesel", "Petrol", "Heavy Oil", "Facility Power"];
        const MATERIAL_TO_FACILITY_MAP = { "Construction Materials": ["Materials Factory"], "Processed Construction Materials": ["Metalworks Factory"], "Steel Construction Materials": ["Metalworks Factory"], "Assembly Materials I": ["Materials Factory"], "Assembly Materials II": ["Materials Factory"], "Assembly Materials III": ["Metalworks Factory"], "Assembly Materials IV": ["Metalworks Factory"], "Assembly Materials V": ["Metalworks Factory"], "Coke": ["Coal Refinery"], "Heavy Explosive Powder": ["Ammunition Factory"], "Petrol": ["Oil Refinery"], "Heavy Oil": ["Oil Refinery"], "Enriched Carbon": ["Coal Refinery"], "Sulfur": ["Coal Refinery", "Oil Refinery"], "Coal": ["Resource Container"], "Scrap": ["Resource Container"] };

        // --- WIKI DATA (Shortened for the example but logic remains same) ---
        const RAW_WIKI_DATA = `Output|Source|Category|In1|In1Amt|In2|In2Amt|OutAmt|SecOut|SecOutAmt|Time\n${`Ve.II Infantry Kit|Factory|Special-Issue Firearms Assembly|Processed Construction Materials|3|Assembly Materials II|5|1|||75`}`; 
        // Note: You can paste your full RAW_WIKI_DATA string here!

        const parseDatabase = (csvText) => {
            const lines = csvText.trim().split('\n');
            const dbMap = {};
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split('|');
                if (parts.length < 8) continue;
                const name = parts[0].trim();
                const facility = parts[1].trim();
                let recipe = `${parts[4]}x ${parts[3]}`;
                if (parts[5]) recipe += `, ${parts[6]}x ${parts[5]}`;
                if (!dbMap[name]) dbMap[name] = { name, methods: [] };
                dbMap[name].methods.push({ facility, recipe });
            }
            return Object.values(dbMap).sort((a, b) => a.name.localeCompare(b.name));
        };

        const RECIPE_DB = parseDatabase(RAW_WIKI_DATA);

        const App = () => {
            const [activeTab, setActiveTab] = useState('facilities');
            const [craftSearch, setCraftSearch] = useState('');
            const [craftSelected, setCraftSelected] = useState(null);
            
            // Re-initializing Lucide icons after render
            useEffect(() => { lucide.createIcons(); }, [activeTab, craftSelected]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-2.5 rounded-xl shadow-lg">
                                <i data-lucide="layout" class="text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-white tracking-tight uppercase italic">Foxhole Logistics Terminal</h1>
                                <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Secure Local Repository v4.4</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto">
                        <div className="flex gap-2 mb-6 bg-slate-900/40 p-1 rounded-2xl border border-slate-800/50 w-fit backdrop-blur-md">
                            <button onClick={() => setActiveTab('facilities')} className={`px-6 py-3 rounded-xl text-[10px] font-black tracking-widest transition-all ${activeTab === 'facilities' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>FACILITIES</button>
                            <button onClick={() => setActiveTab('crafting')} className={`px-6 py-3 rounded-xl text-[10px] font-black tracking-widest transition-all ${activeTab === 'crafting' ? 'bg-purple-600 text-white' : 'text-slate-500'}`}>CRAFT HELPER</button>
                        </div>

                        <div className="bg-slate-900/80 rounded-3xl border border-slate-800 shadow-2xl p-8 min-h-[400px]">
                            {activeTab === 'crafting' ? (
                                <div className="max-w-3xl mx-auto">
                                    <input 
                                        type="text" 
                                        placeholder="Search items..." 
                                        className="w-full bg-slate-950 border-2 border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-purple-500"
                                        onChange={(e) => setCraftSearch(e.target.value)}
                                    />
                                    <div className="mt-4 space-y-2">
                                        {RECIPE_DB.filter(r => r.name.toLowerCase().includes(craftSearch.toLowerCase())).map((item, idx) => (
                                            <div key={idx} className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                                                <span className="font-bold">{item.name}</span>
                                                <span className="text-xs text-purple-400 uppercase font-black">{item.methods.length} Methods</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center py-20">
                                    <i data-lucide="factory" class="mx-auto w-12 h-12 text-slate-700 mb-4"></i>
                                    <p className="text-slate-500 font-bold uppercase tracking-widest">Facility Database Online</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
